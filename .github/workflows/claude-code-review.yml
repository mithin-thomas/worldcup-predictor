name: Claude Code Review

on:
  pull_request:
    # Trimmed from the default [opened, synchronize, ready_for_review,
    # reopened]. `synchronize` fires on every push to the PR branch —
    # which means a noisy WIP PR triggers a full review every commit,
    # eating Claude Code plan quota for very little incremental signal.
    # Keep the three "deliberate" events: PR creation, draft -> ready,
    # and closed -> reopened.
    types: [opened, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip drafts — `draft -> ready_for_review` will fire a review when
    # the author signals it's ready. Saves quota on iterative WIP work.
    if: github.event.pull_request.draft == false
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # `write` (not `read`) is required to POST review comments on the PR.
      # With `read`, the action runs to completion ("success") but cannot
      # attach comments — appears as a silent successful run.
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # Pinned for reproducibility only — NOT the fix. The real reason PR
        # reviews posted nothing was the missing --comment flag below, which is
        # independent of action version, permissions, and tool allowlists.
        uses: anthropics/claude-code-action@v1.0.141
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is REQUIRED. Without it the code-review plugin runs the
          # full review but prints to the action log only and posts NOTHING to
          # the PR (the "completes green, PR stays silent" symptom we chased for
          # ages). With --comment it posts inline findings, or a gh pr comment
          # summary when the diff is clean.
          #
          # In addition to the code/spec review, enforce the contribution
          # standards: CONTRIBUTING.md + the PR template (both in the repo).
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment

            In the SAME review comment, also check this PR against the project's
            contribution standards (read the files from the repo):

            1. CONTRIBUTING.md — does the PR follow it? In particular: tests added
               for new behavior, Conventional Commit messages, and — critically —
               is `docs/REQUIREMENTS.md` updated for any NEW or CHANGED user-facing
               behavior? Flag a behavior change that does not touch the spec.
            2. .github/pull_request_template.md — does the PR description actually
               fill every required section (Summary, Screenshots for UI changes,
               How I tested, and the checklist), with no blank or placeholder
               sections left in?
            3. Locked decisions — if the PR edits a SETTLED decision in the spec
               (the SSO `sayonetech.com` gate, server-authoritative kickoff/window
               locks, admin roles, or prediction privacy/reveal), flag it as
               requiring explicit maintainer sign-off; it must NOT be self-approved
               by a same-PR spec edit.

            Report these as a short checklist (✅ / ❌ with the specific gap and a
            fix) alongside the code findings. Don't nitpick anything the guidelines
            don't require.
          # NOTE: use_sticky_comment is effectively a no-op in agent mode (a
          # custom prompt with track_progress at its default of false), so it is
          # NOT the safety net. If a clean review still looks silent, or posts
          # but lands empty ("No buffered inline comments", upstream issue
          # #1087), escalate to the documented pattern: set `track_progress: true`
          # and add `claude_args` with an explicit allowlist that includes
          # mcp__github_inline_comment__create_inline_comment.
          use_sticky_comment: true
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
