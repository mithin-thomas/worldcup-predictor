openapi: 3.1.0
info:
  title: SayScore API
  version: 0.1.0
  description: >
    Internal API for SayScore — the SayOne FIFA World Cup 2026 prediction game.
    Authentication is via Google Workspace SSO (ID-token flow); authenticated
    endpoints require the httpOnly `sayscore_session` cookie set at sign-in.
servers:
  - url: /
    description: Same origin (the frontend proxies /api to the backend)

tags:
  - name: Ops
  - name: Auth
  - name: Fixtures
  - name: Predictions
  - name: Leaderboards
  - name: Bonus
  - name: Admin

paths:
  /healthz:
    get:
      tags: [Ops]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: ["ok"] }

  /api/auth/google:
    post:
      tags: [Auth]
      summary: Sign in with a Google ID token
      description: >
        Verifies the Google ID token (signature + audience), enforces the
        `sayonetech.com` hosted-domain gate, provisions/refreshes the user, and
        sets an httpOnly session cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
                  description: Google Identity Services credential (a signed JWT).
      responses:
        "200":
          description: Signed in. Sets the session cookie and returns the user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          description: id_token missing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Invalid Google token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Account is outside the allowed domain
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out (clears the session cookie)
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: ["logged out"] }

  /api/me:
    get:
      tags: [Auth]
      summary: The current authenticated user
      responses:
        "200":
          description: The signed-in user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/matches:
    get:
      tags: [Fixtures]
      summary: All matches grouped by IST date
      description: >
        Returns every match grouped by its IST calendar date (kickoff-ordered),
        with a server-computed `locked` flag (true once `now >= kickoff_utc`).
        Times are stored UTC and returned both as UTC and IST.
      responses:
        "200":
          description: Matches grouped by IST day
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchesResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/matches/{id}/prediction:
    put:
      tags: [Predictions]
      summary: Create or update the caller's prediction for a match
      description: >
        Upserts the authenticated user's predicted scoreline for a match. The
        server is authoritative for kickoff locking and rejects writes once
        `now >= kickoff_utc`.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [home_score, away_score]
              properties:
                home_score: { type: integer, minimum: 0, maximum: 99 }
                away_score: { type: integer, minimum: 0, maximum: 99 }
                penalty_winner_team_id: { type: [integer, "null"] }
      responses:
        "200":
          description: Stored prediction
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Prediction" }
        "400":
          description: Bad request (invalid match id or JSON body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Match not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Match is locked (now >= kickoff)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Validation error (TBD teams, bad scores, bad penalty winner)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/winners:
    get:
      tags: [Leaderboards]
      summary: Hall of Fame — past weekly champions
      description: >
        Returns every past weekly champion grouped by week, newest first.
        Visible to all authenticated users (the ₹500 gift-card payout status is
        transparent to everyone). `week_start` is the IST calendar Monday
        (a DATE). Co-winners each appear as their own entry within the week.
        An empty result returns `{ "weeks": [] }`.
      responses:
        "200":
          description: Past champions grouped by week (newest first)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WinnersResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/bonus:
    get:
      tags: [Bonus]
      summary: The caller's tournament bonus picks and lock state
      description: >
        Returns the authenticated user's seven-category tournament bonus picks
        plus the server-authoritative lock state. `lock_at` is the configured
        `BONUS_LOCK_AT` (RFC3339); `locked` is true once `now >= lock_at`. Each
        pick's `ref_type` is `team` (winner/runner_up/fair_play) or `player`
        (golden_ball/golden_boot/golden_glove/young_player); `label` is the
        resolved team/player name; `points` is present only once scored.
        Categories with no pick are omitted.
      responses:
        "200":
          description: The caller's picks and lock state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BonusResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Bonus]
      summary: Upsert the caller's tournament bonus picks
      description: >
        Upserts any subset of the seven bonus picks. Each `ref_id` is validated
        against the correct table for the category's ref-type (team vs player).
        The server is authoritative for the bonus lock and rejects all writes
        once `now >= BONUS_LOCK_AT`. Returns the same shape as `GET /api/bonus`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [picks]
              properties:
                picks:
                  type: array
                  items:
                    type: object
                    required: [category, ref_id]
                    properties:
                      category: { $ref: "#/components/schemas/BonusCategory" }
                      ref_id: { type: integer, format: int64 }
      responses:
        "200":
          description: Updated picks and lock state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BonusResponse" }
        "400":
          description: Bad request (invalid category, missing/wrong-type ref, or invalid JSON body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Bonus predictions are locked (now >= BONUS_LOCK_AT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/teams:
    get:
      tags: [Bonus]
      summary: All teams for the bonus team-award dropdowns
      responses:
        "200":
          description: Teams
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Team" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/players:
    get:
      tags: [Bonus]
      summary: Search players for the bonus player-award typeahead
      description: >
        Name search over the seeded squads, capped at 20 rows, for the player
        award comboboxes (golden ball/boot/glove, young player).
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
          description: Name search term.
      responses:
        "200":
          description: Matching players (capped at 20)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Player" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/admin/bonus/results:
    put:
      tags: [Admin]
      summary: Set tournament-award outcomes
      description: >
        Upserts one or more bonus-award outcomes (the actual winner, golden ball,
        etc.), each validated like a pick (known category, `ref_id` exists in the
        correct table). A standard admin route (`RequireAdmin`) registered in all
        environments. Scoring is then materialized via the `bonus-score` debug job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [results]
              properties:
                results:
                  type: array
                  items:
                    type: object
                    required: [category, ref_id]
                    properties:
                      category: { $ref: "#/components/schemas/BonusCategory" }
                      ref_id: { type: integer, format: int64 }
      responses:
        "200":
          description: Outcomes saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved: { type: integer, description: "Number of outcomes upserted" }
        "400":
          description: Bad request (invalid category, wrong-type ref, or invalid JSON body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/admin/winners/paid:
    put:
      tags: [Admin]
      summary: Mark a weekly winner's ₹500 gift card paid or unpaid
      description: >
        Toggles a weekly winner's prize payout status. `paid=true` sets
        `prize_paid` and records `paid_at`; `paid=false` clears both. A standard
        admin route (`RequireAdmin`) registered in all environments — not
        debug-gated like `/api/admin/jobs/run`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [week_start, user_id, paid]
              properties:
                week_start:
                  type: string
                  format: date
                  description: IST calendar Monday (YYYY-MM-DD).
                user_id: { type: integer, format: int64 }
                paid: { type: boolean }
      responses:
        "200":
          description: Updated payout status
          content:
            application/json:
              schema:
                type: object
                properties:
                  week_start: { type: string, format: date }
                  user_id: { type: integer, format: int64 }
                  prize_paid: { type: boolean }
        "400":
          description: Bad request (bad week_start, non-positive user_id, or invalid JSON body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: No matching weekly winner row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/admin/matches:
    get:
      tags: [Admin]
      summary: List all matches for admin management
      description: >
        Returns every match with resolved team names for the admin match table,
        ordered by kickoff. A standard admin route (`RequireAdmin`) registered in
        all environments.
      responses:
        "200":
          description: All matches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminMatch" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      tags: [Admin]
      summary: Create a fixture
      description: >
        Creates a new match. Sets `manual_override` and `status=scheduled` so the
        results-ingest never overwrites an admin edit.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminMatchInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
        "400":
          description: >
            Bad request (same home/away team, stage not group|knockout, kickoff
            not RFC3339, unknown team, or invalid JSON body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/admin/matches/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    put:
      tags: [Admin]
      summary: Edit a fixture's detail (not scores)
      description: >
        Updates a match's teams, kickoff, stage, and round. Sets `manual_override`.
        Does not change scores or status.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminMatchInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
        "400":
          description: >
            Bad request (same home/away team, stage not group|knockout, kickoff
            not RFC3339, unknown team, or invalid JSON body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Match not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Admin]
      summary: Delete a fixture
      description: Deletes a match; its predictions cascade.
      responses:
        "204":
          description: Deleted (predictions cascade)
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Match not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/admin/matches/{id}/result:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    put:
      tags: [Admin]
      summary: Set or correct a match result
      description: >
        Finalizes a match result. Sets `status=final` and `manual_override`,
        preserves the existing `api_fixture_id`, and immediately re-scores all
        predictions on the match in one transaction (idempotent recompute). Allowed
        only once the match has kicked off (`now >= kickoff_utc`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [home_score, away_score, went_to_penalties]
              properties:
                home_score: { type: integer, minimum: 0 }
                away_score: { type: integer, minimum: 0 }
                went_to_penalties: { type: boolean }
                penalty_winner_team_id:
                  type: [integer, "null"]
                  format: int64
                  description: >
                    Required (home or away team id) when went_to_penalties is true;
                    only valid for knockout matches.
      responses:
        "200":
          description: Result saved and predictions re-scored
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  status: { type: string, examples: ["final"] }
        "400":
          description: >
            Bad request (negative score, penalties on a non-knockout match, penalty
            winner not the home or away team, match has not kicked off yet, or
            invalid JSON body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Match not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List all users for admin management
      description: >
        Returns every user for the admin user table. A standard admin route
        (`RequireAdmin`) registered in all environments.
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/admin/users/{id}/role:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Admin]
      summary: Promote or demote a user
      description: >
        Sets a user's role. Guards: cannot demote yourself, cannot demote the last
        remaining admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [admin, user] }
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  role: { type: string, enum: [admin, user] }
        "400":
          description: >
            Bad request (changing your own role, demoting the last admin, bad role,
            or invalid JSON body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Not an admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: User not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: sayscore_session
  schemas:
    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        name: { type: string }
        avatar_url: { type: string }
        role: { type: string, enum: [user, admin] }
    Error:
      type: object
      properties:
        error: { type: string }
    AdminMatch:
      type: object
      properties:
        id: { type: integer, format: int64 }
        match_number: { type: integer }
        stage: { type: string, enum: [group, knockout] }
        round: { type: string }
        home_team_id: { type: [integer, "null"], format: int64 }
        home_team: { type: string }
        home_code: { type: string }
        away_team_id: { type: [integer, "null"], format: int64 }
        away_team: { type: string }
        away_code: { type: string }
        kickoff_utc: { type: string, format: date-time }
        status: { type: string, enum: [scheduled, live, final] }
        home_score: { type: [integer, "null"] }
        away_score: { type: [integer, "null"] }
        went_to_penalties: { type: boolean }
        penalty_winner_team_id: { type: [integer, "null"], format: int64 }
        manual_override: { type: boolean }
    AdminMatchInput:
      type: object
      required: [home_team_id, away_team_id, kickoff_utc, stage]
      properties:
        home_team_id: { type: integer, format: int64 }
        away_team_id: { type: integer, format: int64 }
        kickoff_utc: { type: string, format: date-time, description: "RFC3339 UTC kickoff." }
        stage: { type: string, enum: [group, knockout] }
        round: { type: string }
        match_number: { type: integer }
    Prediction:
      type: object
      required: [home_score, away_score]
      properties:
        home_score: { type: integer }
        away_score: { type: integer }
        penalty_winner_team_id: { type: [integer, "null"] }
    Team:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        code: { type: string }
    Player:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        team_code: { type: string }
        position: { type: string }
    BonusCategory:
      type: string
      enum: [winner, runner_up, golden_ball, golden_boot, golden_glove, young_player, fair_play]
    BonusPick:
      type: object
      properties:
        category: { $ref: "#/components/schemas/BonusCategory" }
        ref_type: { type: string, enum: [team, player], description: "team for winner/runner_up/fair_play, player otherwise" }
        ref_id: { type: integer, format: int64, description: "team id or player id per ref_type" }
        label: { type: string, description: "Resolved team/player name for display" }
        points: { type: integer, description: "Materialized once scored; omitted until then" }
    BonusResponse:
      type: object
      properties:
        lock_at: { type: string, format: date-time, description: "BONUS_LOCK_AT (RFC3339)" }
        locked: { type: boolean, description: "true once now >= lock_at (server-authoritative)" }
        picks:
          type: array
          items: { $ref: "#/components/schemas/BonusPick" }
    Venue:
      type: object
      properties:
        name: { type: string }
        city: { type: string }
        country: { type: string }
    Match:
      type: object
      properties:
        id: { type: integer, format: int64 }
        match_number: { type: integer }
        stage: { type: string, enum: [group, knockout] }
        round: { type: string }
        group: { type: string, description: "Group letter for group matches, else empty" }
        label: { type: string, description: "e.g. 'Group A' or 'W73 vs W75'" }
        kickoff_utc: { type: string, format: date-time }
        kickoff_ist: { type: string, format: date-time }
        status: { type: string, enum: [scheduled, live, final] }
        locked: { type: boolean, description: "true once now >= kickoff_utc (server-authoritative)" }
        home: { oneOf: [{ $ref: "#/components/schemas/Team" }, { type: "null" }] }
        away: { oneOf: [{ $ref: "#/components/schemas/Team" }, { type: "null" }] }
        venue: { oneOf: [{ $ref: "#/components/schemas/Venue" }, { type: "null" }] }
        home_score: { type: [integer, "null"], format: int32 }
        away_score: { type: [integer, "null"], format: int32 }
        prediction:
          description: "The caller's prediction for this match, or null if none."
          oneOf:
            - type: "null"
            - { $ref: "#/components/schemas/Prediction" }
    Day:
      type: object
      properties:
        date: { type: string, description: "IST calendar date (YYYY-MM-DD)" }
        matches:
          type: array
          items: { $ref: "#/components/schemas/Match" }
    MatchesResponse:
      type: object
      properties:
        days:
          type: array
          items: { $ref: "#/components/schemas/Day" }
    Winner:
      type: object
      properties:
        user_id: { type: integer, format: int64 }
        name: { type: string }
        avatar_url: { type: string }
        points: { type: integer, format: int64 }
        prize_paid: { type: boolean, description: "true once the ₹500 gift card is marked paid" }
    WinnerWeek:
      type: object
      properties:
        week_start: { type: string, format: date, description: "IST calendar Monday (YYYY-MM-DD)" }
        winners:
          type: array
          items: { $ref: "#/components/schemas/Winner" }
    WinnersResponse:
      type: object
      properties:
        weeks:
          type: array
          items: { $ref: "#/components/schemas/WinnerWeek" }

# Authenticated endpoints require the session cookie; per-operation `security: []`
# marks the public ones (healthz, sign-in).
security:
  - sessionCookie: []
