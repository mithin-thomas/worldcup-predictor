openapi: 3.1.0
info:
  title: SayScore API
  version: 0.1.0
  description: >
    Internal API for SayScore — the SayOne FIFA World Cup 2026 prediction game.
    Authentication is via Google Workspace SSO (ID-token flow); authenticated
    endpoints require the httpOnly `sayscore_session` cookie set at sign-in.
servers:
  - url: /
    description: Same origin (the frontend proxies /api to the backend)

tags:
  - name: Ops
  - name: Auth
  - name: Fixtures
  - name: Predictions

paths:
  /healthz:
    get:
      tags: [Ops]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: ["ok"] }

  /api/auth/google:
    post:
      tags: [Auth]
      summary: Sign in with a Google ID token
      description: >
        Verifies the Google ID token (signature + audience), enforces the
        `sayonetech.com` hosted-domain gate, provisions/refreshes the user, and
        sets an httpOnly session cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
                  description: Google Identity Services credential (a signed JWT).
      responses:
        "200":
          description: Signed in. Sets the session cookie and returns the user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          description: id_token missing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Invalid Google token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Account is outside the allowed domain
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out (clears the session cookie)
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: ["logged out"] }

  /api/me:
    get:
      tags: [Auth]
      summary: The current authenticated user
      responses:
        "200":
          description: The signed-in user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/matches:
    get:
      tags: [Fixtures]
      summary: All matches grouped by IST date
      description: >
        Returns every match grouped by its IST calendar date (kickoff-ordered),
        with a server-computed `locked` flag (true once `now >= kickoff_utc`).
        Times are stored UTC and returned both as UTC and IST.
      responses:
        "200":
          description: Matches grouped by IST day
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchesResponse" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/matches/{id}/prediction:
    put:
      tags: [Predictions]
      summary: Create or update the caller's prediction for a match
      description: >
        Upserts the authenticated user's predicted scoreline for a match. The
        server is authoritative for kickoff locking and rejects writes once
        `now >= kickoff_utc`.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [home_score, away_score]
              properties:
                home_score: { type: integer, minimum: 0, maximum: 99 }
                away_score: { type: integer, minimum: 0, maximum: 99 }
                penalty_winner_team_id: { type: [integer, "null"] }
      responses:
        "200":
          description: Stored prediction
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Match" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Match not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Match is locked (now >= kickoff)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Validation error (TBD teams, bad scores, bad penalty winner)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: sayscore_session
  schemas:
    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        name: { type: string }
        avatar_url: { type: string }
        role: { type: string, enum: [user, admin] }
    Error:
      type: object
      properties:
        error: { type: string }
    Team:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        code: { type: string }
    Venue:
      type: object
      properties:
        name: { type: string }
        city: { type: string }
        country: { type: string }
    Match:
      type: object
      properties:
        id: { type: integer, format: int64 }
        match_number: { type: integer }
        stage: { type: string, enum: [group, knockout] }
        round: { type: string }
        group: { type: string, description: "Group letter for group matches, else empty" }
        label: { type: string, description: "e.g. 'Group A' or 'W73 vs W75'" }
        kickoff_utc: { type: string, format: date-time }
        kickoff_ist: { type: string, format: date-time }
        status: { type: string, enum: [scheduled, live, final] }
        locked: { type: boolean, description: "true once now >= kickoff_utc (server-authoritative)" }
        home: { oneOf: [{ $ref: "#/components/schemas/Team" }, { type: "null" }] }
        away: { oneOf: [{ $ref: "#/components/schemas/Team" }, { type: "null" }] }
        venue: { oneOf: [{ $ref: "#/components/schemas/Venue" }, { type: "null" }] }
        home_score: { type: [integer, "null"], format: int32 }
        away_score: { type: [integer, "null"], format: int32 }
        prediction:
          description: "The caller's prediction for this match, or null if none."
          oneOf:
            - type: "null"
            - type: object
              properties:
                home_score: { type: integer }
                away_score: { type: integer }
                penalty_winner_team_id: { type: [integer, "null"] }
    Day:
      type: object
      properties:
        date: { type: string, description: "IST calendar date (YYYY-MM-DD)" }
        matches:
          type: array
          items: { $ref: "#/components/schemas/Match" }
    MatchesResponse:
      type: object
      properties:
        days:
          type: array
          items: { $ref: "#/components/schemas/Day" }

# Authenticated endpoints require the session cookie; per-operation `security: []`
# marks the public ones (healthz, sign-in).
security:
  - sessionCookie: []
