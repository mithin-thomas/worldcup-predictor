<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chased by the GOAT — SayScore</title>

    <!-- Favicons & PWA (assets in docs/brand, served from /public) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#060913" />

    <!-- FIFA.com-style light page background (self-contained; no shimmer-stage/GIS/app-bg).
         !important is required: game-main.tsx imports tokens.css, whose `body { background: var(--bg) }`
         (the app's dark theme) loads later and would otherwise override this. -->
    <style>
      html,body{margin:0;height:100%}
      body{
        min-height:100vh;
        color:#0a0e1a;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
        background:#eceef6 !important; /* FIFA World Cup 2026 light page colour */
      }
      /* Keep the brief loading text readable on the light background. */
      .game-page__loading{color:#5b6170 !important;}
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/game-main.tsx"></script>
  </body>
</html>
