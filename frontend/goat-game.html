<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chased by the GOAT — SayScore</title>

    <!-- Favicons & PWA (assets in docs/brand, served from /public) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#060913" />

    <!-- World Cup stadium background (self-contained; no shimmer-stage/GIS/app-bg) -->
    <style>
      html,body{margin:0;height:100%}
      body{
        min-height:100vh; color:#f5f5f7;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
        /* Roaring World Cup crowd behind the game, darkened with a scrim +
           centre vignette so the game's panels and text stay readable. */
        background:
          radial-gradient(1100px 720px at 50% 40%, rgba(3,6,14,.42), rgba(3,5,12,.88) 80%),
          linear-gradient(180deg, rgba(3,5,12,.66) 0%, rgba(2,4,10,.82) 100%),
          url('/login-bg.jpg') center/cover no-repeat fixed;
        background-color:#05070f; /* fallback before the image paints */
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/game-main.tsx"></script>
  </body>
</html>
