<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SayScore — World Cup 2026 Predictions</title>

    <!-- Favicons & PWA (assets in docs/brand, served from /public) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta property="og:title" content="SayScore — World Cup 2026 Predictions" />
    <meta property="og:image" content="/og-image.png" />

    <!-- v2 Apple-style design system uses the native San Francisco / system
         font stack (see frontend/src/styles/tokens.css) — no web fonts loaded. -->

    <!-- Google Identity Services loader. Intentionally NO crossorigin and NO SRI:
         it's an unversioned auto-updating script with no stable hash, and forcing
         CORS mode makes the plain <script> load fail (no ACAO header from Google). -->
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>
  <body>
    <!-- Always-on backdrop layers (match Saxone Predictions.html shell) -->
    <div class="app-bg"></div>
    <div class="thunder-bg" aria-hidden="true"></div>
    <div class="thunder-flash" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
