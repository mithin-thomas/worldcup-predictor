# SayScore frontend nginx: serve the SPA and reverse-proxy /api to the backend.
# `backend` resolves to the backend service on the shared compose/host network.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths return index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # First-party API proxy so the session cookie stays same-origin.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache built static assets aggressively (hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
