# SayScore PRODUCTION stack — Caddy (auto-HTTPS) + backend + MySQL.
# Run from the repo root:
#   docker compose --env-file .env.prod -p sayscore-prod -f deploy/docker-compose.prod.yml up -d --build
# (or: make deploy-prod)
#
# Requires:
#   - a .env.prod with real secrets (copy .env.prod.example) — NEVER commit it
#   - DNS for SITE_ADDRESS pointing at this host, with ports 80 + 443 open
#     (Caddy provisions a Let's Encrypt cert automatically)
#   - the prod origin added as an Authorized JavaScript origin on the OAuth client
name: sayscore-prod

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env.prod}
      MYSQL_DATABASE: ${DB_NAME:-wcp}
      MYSQL_USER: ${DB_USER:-wcp}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env.prod}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-wcp}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql
    # No host port: only the backend reaches MySQL on the internal network.

  # One-shot: apply migrations, then exit. Backend waits for success.
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../backend/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=mysql://${DB_USER:-wcp}:${DB_PASSWORD}@tcp(mysql:3306)/${DB_NAME:-wcp}"
      - "up"
    restart: on-failure

  # One-shot: load the committed fixture seed (INSERT IGNORE → idempotent).
  seed:
    image: mysql:8.0
    environment:
      MYSQL_PWD: ${DB_PASSWORD}
    entrypoint: ["sh", "-c", "mysql --host=mysql --user=${DB_USER:-wcp} ${DB_NAME:-wcp} < /seed.sql"]
    volumes:
      - ./seed/seed.sql:/seed.sql:ro
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  backend:
    # Built + pushed to ECR by CI; the host pulls it. Full ref (incl.
    # registry/account) comes from .env.prod, so nothing is hardcoded here.
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE in .env.prod}
    restart: unless-stopped
    environment:
      APP_ENV: production          # Secure cookies on; debug job route OFF
      HTTP_PORT: "8000"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-wcp}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-wcp}
      TZ: Asia/Kolkata
      SEED_DATA_DIR: /app/data
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env.prod}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env.prod}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-sayonetech.com}
      SEED_ADMIN_EMAILS: ${SEED_ADMIN_EMAILS:-}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      RESULTS_CRON_ENABLED: ${RESULTS_CRON_ENABLED:-true}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # Chat assistant. Set OPENAI_API_KEY in .env.prod to enable; leave blank to
      # disable (POST /api/chat returns 503). The prompt file must exist on the
      # host at ../chat-system.txt (gitignored — place it at deploy time); it is
      # mounted below, and the path here is the in-container location.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini-2025-04-14}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.8}
      OPENAI_SYSTEM_PROMPT_FILE: /app/chat-system.txt
    volumes:
      - ../data:/app/data:ro
      - ../chat-system.txt:/app/chat-system.txt:ro
    depends_on:
      mysql:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    # No host port: Caddy proxies to backend:8000 on the internal network.

  caddy:
    # Built + pushed to ECR by CI (with the prod VITE_GOOGLE_CLIENT_ID baked in);
    # the host pulls it via FRONTEND_IMAGE from .env.prod.
    image: ${FRONTEND_IMAGE:?set FRONTEND_IMAGE in .env.prod}
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set SITE_ADDRESS in .env.prod (your public hostname)}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - caddy_data:/data       # persisted TLS certs + ACME account
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
