# SayScore local stack — full app via Docker.
#   docker compose -f deploy/docker-compose.yml up --build      (or: make up)
# Then open http://localhost:8080 (frontend → proxies /api to backend).
# Requires backend/.env (copy from .env.example). Build args read VITE_* from
# your shell/env for the frontend bundle.
name: sayscore

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: wcp
      MYSQL_USER: wcp
      MYSQL_PASSWORD: wcp
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uwcp", "-pwcp"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  # One-shot: apply DB migrations, then exit. Backend waits for this to succeed.
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../backend/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=mysql://wcp:wcp@tcp(mysql:3306)/wcp"
      - "up"
    restart: on-failure

  # One-shot: load the committed SQL seed (data only — schema comes from migrate),
  # then exit. INSERT IGNORE makes it idempotent, so re-running on an existing
  # volume is a no-op and never clobbers admin edits. Regenerate the file with
  # `make dump-seed`. Backend waits for this to succeed.
  seed:
    image: mysql:8.0
    environment:
      MYSQL_PWD: wcp
    entrypoint: ["sh", "-c", "mysql --host=mysql --user=wcp wcp < /seed.sql"]
    volumes:
      - ./seed/seed.sql:/seed.sql:ro
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  backend:
    image: sayscore-backend:local
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      APP_ENV: development
      HTTP_PORT: "8000"
      # Inside the network the DB host is the compose service name, not localhost.
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: wcp
      DB_PASSWORD: wcp
      DB_NAME: wcp
      TZ: Asia/Kolkata
      # Don't auto-run the results-ingest cron in the local/demo stack — it would
      # fetch live results and overwrite seeded demo data. Trigger it on demand
      # from Admin → Settings → "Background jobs (debug)" when testing.
      RESULTS_CRON_ENABLED: "false"
      # The results-ingest scheduler + debug trigger read the fd-team alias map
      # from here; the dataset is mounted below.
      SEED_DATA_DIR: /app/data
    volumes:
      - ../data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-}"
        VITE_API_BASE_URL: "/api"
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
